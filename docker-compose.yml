services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml

  stream-manager:
    # Pull the pre-built multi-arch image from GHCR (default for deployment):
    image: ghcr.io/tongvtu/stream_armbian/stream-manager:latest
    # Or build locally on the host for development (uncomment below, comment out image above):
    # build:
    #   context: ./manager
    #   dockerfile: Dockerfile
    container_name: stream-manager
    network_mode: host
    privileged: true
    restart: unless-stopped
    volumes:
      - /dev/bus/usb:/dev/bus/usb
